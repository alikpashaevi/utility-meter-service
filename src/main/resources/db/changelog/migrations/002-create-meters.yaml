databaseChangeLog:
  - changeSet:
      id: 002-create-meters
      author: alikpashaevi
      comment: "Meters table with correct UUID foreign key mapping"
      changes:
        - createTable:
            tableName: meters
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_meters_user_id
                    referencedTableName: users
                    referencedColumnNames: id

              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
                  remarks: "WATER | ELECTRICITY | GAS | HEAT"

              - column:
                  name: label
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: serial_number
                  type: varchar(100)
                  constraints:
                    nullable: false
                  remarks: "Physical serial number printed on the device"

              - column:
                  name: unit
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: true

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: NOW()

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: NOW()

        - createIndex:
            indexName: idx_meters_user_id
            tableName: meters
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_meters_serial_number
            tableName: meters
            unique: true
            columns:
              - column:
                  name: serial_number

      rollback:
        - dropTable:
            tableName: meters